                tooltip.html(html)
                    .style('left', (event.pageX + 15) + 'px')
                    .style('top', (event.pageY - 15) + 'px');
            });
        }

        function calculateHierarchicalLayout(nodes, links, workflow) {
            const nodeMap = new Map();
            nodes.forEach(n => nodeMap.set(n.id, n));

            // Build adjacency list for main flow
            const children = new Map();
            const parents = new Map();

            links.forEach(link => {
                const sourceId = typeof link.source === 'object' ? link.source.id : link.source;
                const targetId = typeof link.target === 'object' ? link.target.id : link.target;

                // Use next, fail, then, else for hierarchy (not fork or param)
                // All these link types should enforce top-down flow
                if (['next', 'fail', 'then', 'else'].includes(link.type)) {
                    if (!children.has(sourceId)) children.set(sourceId, []);
                    children.get(sourceId).push(targetId);
                    if (!parents.has(targetId)) {
                        parents.set(targetId, sourceId);
                    }
                }
            });

            // Find root node (first_task)
            const rootId = workflow.first_task;

            // Assign levels using BFS, taking maximum level for nodes with multiple parents
            const levels = new Map();
            const queue = [[rootId, 0]];
            const inQueue = new Set([rootId]);

            while (queue.length > 0) {
                const [nodeId, level] = queue.shift();
                inQueue.delete(nodeId);

                // Update level to maximum (ensures top-down flow)
                const currentLevel = levels.get(nodeId);
                if (currentLevel === undefined || level > currentLevel) {
                    levels.set(nodeId, level);
                }

                const actualLevel = levels.get(nodeId);

                const nodeChildren = children.get(nodeId) || [];
                nodeChildren.forEach(childId => {
                    const childLevel = actualLevel + 1;
                    if (!inQueue.has(childId)) {
                        queue.push([childId, childLevel]);
                        inQueue.add(childId);
                    } else {
                        // Re-queue with potentially higher level
                        queue.push([childId, childLevel]);
                    }
                });

                // Also handle fork tasks
                const node = nodeMap.get(nodeId);
                if (node && node.fork_tasks) {
                    node.fork_tasks.forEach(forkId => {
                        const forkLevel = actualLevel + 1;
                        if (!inQueue.has(forkId)) {
                            queue.push([forkId, forkLevel]);
                            inQueue.add(forkId);
                        } else {
                            queue.push([forkId, forkLevel]);
                        }
                    });
                }
            }

            // Assign levels to nodes not in the main tree
            nodes.forEach(node => {
                if (!levels.has(node.id)) {
                    levels.set(node.id, 0);
                }
            });

            // Group nodes by level
            const nodesByLevel = new Map();
            let maxLevel = 0;
            nodes.forEach(node => {
                const level = levels.get(node.id) || 0;
                if (!nodesByLevel.has(level)) nodesByLevel.set(level, []);
                nodesByLevel.get(level).push(node);
                maxLevel = Math.max(maxLevel, level);
            });

            // Layout parameters
            const nodeWidth = 180;
            const nodeHeight = 90;
            const horizontalSpacing = 280;
            const verticalSpacing = 170;
            const marginLeft = 120;
            const marginTop = 120;

            // First pass: calculate maximum width needed
            let maxWidth = 0;
            for (let level = 0; level <= maxLevel; level++) {
                const levelNodes = nodesByLevel.get(level) || [];
                const levelWidth = levelNodes.length * horizontalSpacing;
                maxWidth = Math.max(maxWidth, levelWidth);
            }

            // Second pass: position nodes centered at each level
            for (let level = 0; level <= maxLevel; level++) {
                const levelNodes = nodesByLevel.get(level) || [];
                const levelWidth = levelNodes.length * horizontalSpacing;
                const startX = marginLeft + (maxWidth - levelWidth) / 2;

                levelNodes.forEach((node, index) => {
                    node.x = startX + index * horizontalSpacing;
                    node.y = marginTop + level * verticalSpacing;
                });
            }

            return {
                width: maxWidth + marginLeft * 2,
                height: marginTop * 2 + maxLevel * verticalSpacing
            };
        }

        function markExecutedPath(nodes, links, nodeMap, executedLinks, workflow) {
            // Mark links between executed nodes as executed
            links.forEach(link => {
                const sourceId = typeof link.source === 'object' ? link.source.id : link.source;
                const targetId = typeof link.target === 'object' ? link.target.id : link.target;

                const sourceNode = nodeMap.get(sourceId);
                const targetNode = nodeMap.get(targetId);

                if (sourceNode && targetNode) {
                    const linkKey = `${sourceId}-${targetId}-${link.type}`;

                    // For failure paths (fail), only mark as executed if source actually failed
                    if (link.type === 'fail') {
                        if (sourceNode.status === 'Failed' &&
                            (targetNode.status === 'Completed' || targetNode.status === 'InProgress' || targetNode.status === 'Failed')) {
                            executedLinks.add(linkKey);
                        }
                    } else if (link.type === 'fork') {
                        // For fork links, mark as executed if the target fork branch has started
                        if (targetNode.status === 'Completed' || targetNode.status === 'InProgress') {
                            executedLinks.add(linkKey);
                        }
                    } else {
                        // For other success paths (next, then, else, param), mark as executed if source completed successfully
                        let targetStarted = targetNode.status === 'Completed' || targetNode.status === 'InProgress';

                        // Special case: if target is a fork task, check if any of its children have started
                        if (!targetStarted && targetNode.type === 'fork task' && targetNode.fork_tasks) {
                            targetStarted = targetNode.fork_tasks.some(forkTaskId => {
                                const forkTask = nodeMap.get(forkTaskId);
                                return forkTask && (forkTask.status === 'InProgress' || forkTask.status === 'Completed');
                            });
                        }

                        if (sourceNode.status === 'Completed' && targetStarted) {
                            executedLinks.add(linkKey);
                        }
                    }
                }
            });
        }

        function truncate(str, maxLength) {
            if (!str) return '';
            return str.length > maxLength ? str.substring(0, maxLength - 3) + '...' : str;
        }
    </script>
</body>
